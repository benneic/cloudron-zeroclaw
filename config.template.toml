# ZeroClaw — Cloudron seed config (first run copied to /app/data/.zeroclaw/config.toml)
# Edit via Cloudron File Manager or web terminal after install.

workspace_dir = "/app/data/workspace"
config_path = "/app/data/.zeroclaw/config.toml"

default_provider = "ollama"
default_model = "qwen3.5:9b-mxfp8"

[providers.ollama]
base_url = "http://10.0.0.1:11434"  # address of your Ollama host
tool_calling = "native"             # qwen3.5 supports native function calling
stream = true
num_ctx = 16384                     # bump context if your model card supports it
supports_vision = true              # qwen3.5 isn't in the auto-detect allowlist; flag it explicitly

[runtime]
reasoning_enabled = true            # sends think:true to /api/chat (qwen3.5 reasoning on)

[multimodal]
max_images = 4                      # default 4 — bump if you send many per turn
max_image_size_mb = 10              # default 5 MiB; pre-base64 size
allow_remote_fetch = true           # set true ONLY if you want ZeroClaw to fetch http(s) URLs

[gateway]
port = 42617
host = "[::]"
allow_public_bind = true
require_pairing = true
web_dist_dir = "/app/code/web/dist"

[memory]
backend = "postgres"           # Cloudron postgresql addon (see [storage.provider.config])
auto_save = true               # persist each turn into shared memory

[storage.provider.config]
provider = "postgres"
# db_url is overridden at runtime by ZEROCLAW_POSTGRES_URL, which start.sh
# populates from the Cloudron postgresql addon's CLOUDRON_POSTGRESQL_URL.
db_url = "postgres://placeholder@localhost:5432/zeroclaw"
schema = "public"
table = "memories"
connect_timeout_secs = 15

[autonomy]
level = "supervised"
workspace_only = true       # scoped to workspace by default
auto_approve = [
  "file_read",
  "file_write",
  "file_edit",
  "memory_recall",
  "memory_store",
  "web_search_tool",
  "web_fetch",
  "calculator",
  "glob_search",
  "content_search",
  "image_info",
  "weather",
  "git_operations",
]

[tunnel]
provider = "none"              # "none", "cloudflare", "tailscale", "ngrok", "custom"

[secrets]
encrypt = true                 # API keys encrypted with local key file

[browser]
enabled = true                # opt-in browser_open + browser tools
backend = "auto"      # "agent_browser", "native", "computer_use", "auto"
# allowed_domains = ["github.com"]

[composio]
enabled = false                # opt-in: 1000+ OAuth apps via composio.dev
entity_id = "default"

[identity]
format = "openclaw"            # "openclaw" (markdown) or "aieos" (JSON)
