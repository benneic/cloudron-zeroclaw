# ZeroClaw — Cloudron seed config (first run copied to /app/data/.zeroclaw/config.toml)
# Edit via Cloudron File Manager or web terminal after install.

schema_version = 2

workspace_dir = "/app/data/workspace"
config_path = "/app/data/.zeroclaw/config.toml"

# ── Provider ────────────────────────────────────────────────────────────────
# V2 schema: providers live under [providers.models.<name>] and the active
# profile is selected by [providers].fallback. The map key (here "ollama")
# determines the provider type — no separate `name` field needed.
[providers]
fallback = "ollama"

[providers.models.ollama]
base_url = "http://10.0.0.1:11434"  # address of your LAN Ollama host
model = "qwen3.5:9b-mxfp8"
temperature = 1.0                   # qwen3.5 modelfile default; thinking models prefer 1.0
num_ctx = 16384                     # bump context if your model card supports it
supports_vision = true              # qwen3.5 isn't in the auto-detect allowlist; flag it explicitly

[runtime]
reasoning_enabled = true            # sends think:true to /api/chat — qwen3.5 thinking on

[multimodal]
# Image markers in user messages: [IMAGE:/path], [IMAGE:data:image/...;base64,...]
# Vision capability is reported by the Ollama provider; no extra flag needed.
max_images = 4                      # 1–16 (clamped at runtime)
max_image_size_mb = 10              # 1–20 MiB; pre-base64 size
allow_remote_fetch = false          # SSRF risk — flip to true only on a trusted LAN
# Optional: force-route image-bearing turns to a dedicated vision model.
# vision_provider = "ollama"
# vision_model = "qwen3.5:9b-mxfp8"

[gateway]
port = 42617
host = "[::]"
allow_public_bind = true
require_pairing = true
web_dist_dir = "/app/code/web/dist"

[memory]
backend = "postgres"           # Cloudron postgresql addon (see [storage.provider.config])
auto_save = true               # persist each turn into shared memory

[storage.provider.config]
provider = "postgres"
# db_url is overridden at runtime by ZEROCLAW_POSTGRES_URL, which start.sh
# populates from the Cloudron postgresql addon's CLOUDRON_POSTGRESQL_URL.
db_url = "postgres://placeholder@localhost:5432/zeroclaw"
schema = "public"
table = "memories"
connect_timeout_secs = 15

[autonomy]
level = "supervised"
workspace_only = true       # scoped to workspace by default
auto_approve = [
  "file_read",
  "file_write",
  "file_edit",
  "memory_recall",
  "memory_store",
  "web_search_tool",
  "web_fetch",
  "calculator",
  "glob_search",
  "content_search",
  "image_info",
  "weather",
  "git_operations",
]

[tunnel]
provider = "none"              # "none", "cloudflare", "tailscale", "ngrok", "custom"

[secrets]
encrypt = true                 # API keys encrypted with local key file

[browser]
enabled = true                # opt-in browser_open + browser tools
backend = "auto"      # "agent_browser", "native", "computer_use", "auto"
# allowed_domains = ["github.com"]

[composio]
enabled = false                # opt-in: 1000+ OAuth apps via composio.dev
entity_id = "default"

[identity]
format = "openclaw"            # "openclaw" (markdown) or "aieos" (JSON)
